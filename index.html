<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Product App</title>

    <!-- <link rel="stylesheet" href="style.css" /> -->

    <script src="app.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100 p-6 font-sans">
    <main class="mx-auto max-w-xl border border-gray-300 bg-white p-5">
      <header>
        <h1 class="mb-6 text-3xl font-bold">AI Product App</h1>
      </header>
      <body>
        <form id="searchForm" class="flex flex-col gap-3">
          <label for="topic" class="text-sm font-medium text-gray-800">
            Product topic:
          </label>
          <input
            id="topic"
            type="text"
            placeholder="e.g. saxophones"
            class="rounded border border-gray-300 px-3 py-2 text-base outline-none focus:border-blue-500"
          />

          <label for="tone" class="text-sm font-medium text-gray-800">
            Response tone:
          </label>
          <input
            id="tone"
            type="text"
            placeholder="e.g. friendly"
            class="rounded border border-gray-300 px-3 py-2 text-base outline-none focus:border-blue-500"
          />

          <button
            type="submit"
            class="mt-2 rounded bg-blue-600 px-4 py-2 text-white hover:bg-blue-700"
          >
            Ask AI
          </button>
        </form>

        <p id="status" class="mt-4 font-bold text-gray-900"></p>

        <div
          id="results"
          class="mt-3 whitespace-pre-wrap rounded border border-gray-200 bg-gray-50 p-3 text-gray-800"
        ></div>
      </body>
      <footer>
        <p class="text-xs">Copyright Oliver Marroquin</p>
      </footer>
    </main>
  </body>
</html>
